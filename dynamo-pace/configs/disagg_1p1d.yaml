# disagg_1p1d.yaml
# Disaggregated serving: 1 prefill worker + 1 decode worker
# Total GPUs required: 2 (1 per worker, tensor_parallel_size=1)

Frontend:
  port: 8000

VllmWorker:
  model: "${MODEL}"
  tensor_parallel_size: 1
  max_num_seqs: 256
  max_model_len: 8192
  enforce_eager: true
  dtype: "bfloat16"

Prefill:
  num_workers: 1

Decode:
  num_workers: 1
