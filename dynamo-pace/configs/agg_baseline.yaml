# agg_baseline.yaml
# Aggregated baseline: standard vLLM serving with NO disaggregation.
# Prefill and decode run together on the same worker(s).
# Total GPUs required: 1 (tensor_parallel_size=1)
# Use this as the latency/throughput baseline to compare against disagg configs.

Frontend:
  port: 8000

VllmWorker:
  model: "${MODEL}"
  tensor_parallel_size: 1
  max_num_seqs: 256
  max_model_len: 8192
  enforce_eager: true
  dtype: "bfloat16"

# Single aggregated worker — no Prefill/Decode split, no disaggregation
Worker:
  num_workers: 1
