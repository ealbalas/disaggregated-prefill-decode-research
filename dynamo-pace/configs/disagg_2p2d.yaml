# disagg_2p2d.yaml
# Disaggregated serving: 2 prefill workers + 2 decode workers
# Total GPUs required: 4 (tensor_parallel_size=1 per worker)
# Balanced topology for mixed prefill/decode workloads.

Frontend:
  port: 8000

VllmWorker:
  model: "${MODEL}"
  tensor_parallel_size: 1
  max_num_seqs: 256
  max_model_len: 8192
  enforce_eager: true
  dtype: "bfloat16"

Prefill:
  num_workers: 2

Decode:
  num_workers: 2
