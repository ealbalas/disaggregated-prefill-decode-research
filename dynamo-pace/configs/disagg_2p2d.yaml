# disagg_2p2d.yaml
# Disaggregated serving: 2 prefill workers + 2 decode workers
# Total GPUs required: 4 (tensor_parallel_size=1 per worker)
# Balanced topology for mixed prefill/decode workloads.

Frontend:
  host: "0.0.0.0"
  port: 8000
  num_uvicorn_workers: 2

Router:
  type: "kv"

VllmWorker:
  model: "${MODEL}"
  tensor_parallel_size: 1
  max_num_seqs: 256
  max_model_len: 8192
  enforce_eager: true
  dtype: "bfloat16"
  environment:
    CC: "/usr/bin/gcc"
    CXX: "/usr/bin/g++"
    VLLM_USE_DEEP_GEMM: "0"
    TORCHINDUCTOR_COMBO_KERNELS: "0"

Prefill:
  num_workers: 2

Decode:
  num_workers: 2

KvTransfer:
  kv_connector: "DynamoNixlConnector"
  kv_role: "kv_both"
  kv_buffer_device: "cuda"
  kv_ip: "0.0.0.0"
  kv_port: 14579
